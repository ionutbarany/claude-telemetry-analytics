# Local development stack: PostgreSQL, FastAPI, and Streamlit.
# Usage: docker compose --env-file .env up --build

services:
  # PostgreSQL 16 — system of record for raw events and aggregates.
  # Persists data in the named volume `postgres_data`.
  postgres:
    image: postgres:16
    container_name: telemetry-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # FastAPI — REST API for health checks, events, and analytics queries.
  # Project tree is bind-mounted so code changes reload during development.
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: telemetry-api
    # Bind-mounting the repo over /app requires root in local dev (Windows volume perms).
    user: "0:0"
    working_dir: /app
    env_file:
      - .env
    environment:
      # Override host DB URL so the container reaches the postgres service.
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - .:/app
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy

  # Streamlit — interactive Plotly dashboards for exploration and demos.
  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard.Dockerfile
    container_name: telemetry-dashboard
    user: "0:0"
    working_dir: /app
    env_file:
      - .env
    environment:
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    volumes:
      - .:/app
    command: >
      streamlit run dashboard/Home.py
      --server.address 0.0.0.0
      --server.port 8501
    # Wait for the API process to start before launching the dashboard.
    depends_on:
      api:
        condition: service_started


volumes:
  # Named volume keeps PostgreSQL data across container recreations.
  postgres_data:
